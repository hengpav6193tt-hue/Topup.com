<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreeMC | Instant Minecraft Servers</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; margin: 0; text-align: center; }
        nav { padding: 20px; background: #1f1f1f; display: flex; justify-content: space-between; align-items: center; }
        .hero { padding: 100px 20px; background: linear-gradient(45deg, #2ecc71, #27ae60); }
        .container { max-width: 1000px; margin: auto; padding: 50px; }
        .card-container { display: flex; gap: 20px; justify-content: center; margin-top: 30px; }
        .card { background: #1f1f1f; padding: 30px; border-radius: 15px; width: 300px; border: 2px solid #333; }
        .card:hover { border-color: #2ecc71; }
        button { background: #2ecc71; border: none; padding: 15px 30px; color: white; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 1.1em; }
        button:hover { background: #27ae60; }
        .badge { background: #555; padding: 5px 10px; border-radius: 5px; font-size: 0.8em; }
    </style>
</head>
<body>
    <nav>
        <h2>FreeMC</h2>
        <div>Login / Sign Up</div>
    </nav>

    <div class="hero">
        <h1>Create Your Free Server In Seconds</h1>
        <p>Supports both Java and Bedrock editions.</p>
        <button onclick="scrollToCreate()">Get Started Now</button>
    </div>

    <div class="container" id="create">
        <h2>Select Your Version</h2>
        <div class="card-container">
            <div class="card">
                <h3>☕ Java Edition</h3>
                <p>For PC Users (Windows, Mac, Linux)</p>
                <p class="badge">Version 1.20.x</p>
                <br>
                <button>Create Java Server</button>
            </div>
            <div class="card">
                <h3>📱 Bedrock Edition</h3>
                <p>For Console, Mobile, and Windows 10</p>
                <p class="badge">Latest Stable</p>
                <br>
                <button>Create Bedrock Server</button>
            </div>
        </div>
    </div>
</body>
</html>
